apiVersion: apps/v1
kind: Deployment
metadata:
  name: profit-path-api
  labels:
    app: profit-path-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: profit-path-api
  template:
    metadata:
      labels:
        app: profit-path-api
    spec:
      containers:
      - name: api
        image: profit-path-api:1.0.0
        ports:
        - containerPort: 8000
        env:
        - name: MONGODB_URL
          valueFrom:
            configMapKeyRef:
              name: profit-path-config
              key: mongodb-url
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: profit-path-config
              key: database-name
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: profit-path-secrets
              key: secret-key
        - name: APP_ENV
          value: "production"
        - name: DEBUG
          value: "false"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_FORMAT
          value: "json"
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: model-storage
          mountPath: /app/ai_engine/saved_models
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: profit-path-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: profit-path-api-service
  labels:
    app: profit-path-api
spec:
  selector:
    app: profit-path-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: profit-path-config
data:
  mongodb-url: "mongodb://mongodb-service:27017"
  database-name: "profitpath"
  frontend-origin: "http://localhost:3000"
  allowed-origins: "http://localhost:3000,http://localhost:8000"
---
apiVersion: v1
kind: Secret
metadata:
  name: profit-path-secrets
type: Opaque
stringData:
  secret-key: "CHANGE-THIS-TO-A-SECURE-RANDOM-STRING"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: profit-path-models-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
